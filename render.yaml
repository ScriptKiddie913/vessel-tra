services:
  - type: web
    name: vessel-tracker
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
