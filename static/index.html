<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAT-INTEL | Satellite Intelligence Platform</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--cyan:#00e5ff;--green:#00ff88;--red:#ff3d3d;--amber:#ffab00;--purple:#b388ff;--bg:#060a14;--panel:#0a0e1a;--border:rgba(255,255,255,.06)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#e0e0e0;font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* Layout */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}
.sidebar{width:320px;height:100%;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:1001}
.main{flex:1;position:relative;overflow:hidden}

/* Sidebar */
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:14px;font-weight:700;letter-spacing:.2em;color:#fff;display:flex;align-items:center;gap:8px}
.sidebar-header h1::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.sidebar-header p{font-size:10px;color:#555;margin-top:4px}

.cat-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:12px;border-bottom:1px solid var(--border)}
.cat-btn{padding:4px 8px;border-radius:4px;font-size:10px;font-family:inherit;letter-spacing:.08em;background:transparent;color:#555;border:1px solid transparent;cursor:pointer;transition:.2s}
.cat-btn.active{background:rgba(0,229,255,.12);color:var(--cyan);border-color:rgba(0,229,255,.3)}
.cat-btn:hover{color:#999}

.country-bar{display:flex;flex-wrap:wrap;gap:4px;padding:12px;border-bottom:1px solid var(--border)}
.country-btn{padding:4px 8px;border-radius:4px;font-size:10px;font-family:inherit;background:transparent;color:#555;border:1px solid transparent;cursor:pointer;transition:.2s}
.country-btn.active{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)}

.search-box{padding:12px;border-bottom:1px solid var(--border)}
.search-box input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:8px 12px;font-size:11px;font-family:inherit;color:#fff;outline:none;transition:.2s}
.search-box input:focus{border-color:rgba(0,229,255,.5)}
.search-box input::placeholder{color:#444}
.search-count{font-size:10px;color:#555;margin-top:6px}

.sat-list{flex:1;overflow-y:auto}
.sat-item{width:100%;padding:10px 16px;text-align:left;border:none;background:transparent;border-bottom:1px solid rgba(255,255,255,.02);cursor:pointer;font-family:inherit;transition:.15s;display:block}
.sat-item:hover{background:rgba(255,255,255,.03)}
.sat-item.locked{background:rgba(0,229,255,.08);border-left:2px solid var(--cyan)}
.sat-item .name{color:#fff;font-size:11px;display:flex;align-items:center;gap:6px}
.sat-item .name::before{content:'';width:5px;height:5px;border-radius:50%;background:rgba(0,255,136,.4);flex-shrink:0}
.sat-item.locked .name::before{background:var(--cyan);animation:pulse 1.5s infinite}
.sat-item .meta{color:#555;font-size:10px;margin-top:2px;padding-left:11px}

/* Leaflet */
.leaflet-container{background:var(--bg)!important;font-family:'JetBrains Mono',monospace!important}
.leaflet-control-attribution{background:rgba(0,0,0,.6)!important;color:#555!important;font-size:9px!important;font-family:inherit!important}
.leaflet-control-zoom a{background:rgba(10,14,26,.9)!important;color:var(--cyan)!important;border:1px solid rgba(0,229,255,.2)!important;font-family:inherit!important}
.leaflet-control-zoom a:hover{background:rgba(0,229,255,.15)!important}
.leaflet-popup-content-wrapper{background:transparent!important;border-radius:0!important;box-shadow:none!important;padding:0!important}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip{background:rgba(10,14,26,.95)!important}
.leaflet-popup-close-button{color:#666!important;font-size:16px!important}
.leaflet-popup-close-button:hover{color:var(--red)!important}
.sat-icon,.vessel-icon,.flight-icon{background:none!important;border:none!important}
.vessel-icon svg{transition:transform .4s ease}
.sat-icon svg{transition:transform .3s ease}
.leaflet-marker-icon{will-change:transform}

/* Tracking HUD */
.hud{position:absolute;top:16px;right:16px;width:290px;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);border:1px solid rgba(0,229,255,.2);border-radius:8px;font-size:11px;z-index:1000;display:none;overflow:hidden}
.hud.open{display:block}
.hud-header{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(0,229,255,.08);border-bottom:1px solid rgba(0,229,255,.15)}
.hud-header span{color:var(--cyan);font-size:10px;font-weight:700;letter-spacing:.2em}
.hud-close{margin-left:auto;background:none;border:none;color:#555;cursor:pointer;font-size:16px;font-family:inherit}
.hud-close:hover{color:var(--red)}
.hud-name{padding:12px 16px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.hud-name .sat-n{font-size:13px;font-weight:700;color:#fff}
.hud-name .sat-o{font-size:10px;color:#555;margin-top:2px}
.hud-grid{padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.hud-row{display:flex;justify-content:space-between;align-items:center}
.hud-row .lbl{color:#555;font-size:10px}
.hud-row .val{color:#bbb;font-size:11px;font-variant-numeric:tabular-nums}
.hud-row .val.hl{color:var(--cyan)}
.hud-progress{padding:0 16px 12px}
.hud-progress .bar-label{display:flex;justify-content:space-between;font-size:9px;color:#555;margin-bottom:4px}
.hud-progress .bar{height:3px;background:#1a1a2e;border-radius:4px;overflow:hidden}
.hud-progress .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width 1s}

/* Country dashboard */
.country-dash{position:absolute;top:16px;left:16px;width:250px;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:8px;z-index:1000;font-size:10px;overflow:hidden}
.country-dash-header{padding:10px 16px;border-bottom:1px solid var(--border);color:var(--cyan);font-weight:700;letter-spacing:.15em;font-size:10px}
.country-dash-body{padding:10px 12px}
.cd-row{margin-bottom:6px}
.cd-row .cd-label{display:flex;justify-content:space-between;color:#888;margin-bottom:2px}
.cd-row .cd-label .cd-cnt{color:#bbb;font-variant-numeric:tabular-nums}
.cd-row .cd-bar{height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.cd-row .cd-bar-fill{height:100%;border-radius:2px;opacity:.7;transition:width .5s}
.country-dash-footer{padding:8px 16px;border-top:1px solid var(--border);color:#444;font-size:9px}

/* Imagery panel */
.imagery-toggle{position:absolute;top:16px;right:320px;z-index:1000}
.imagery-btn{padding:8px 12px;border-radius:8px;font-size:10px;font-family:inherit;background:rgba(0,0,0,.7);color:#888;border:1px solid var(--border);cursor:pointer;letter-spacing:.08em;transition:.2s}
.imagery-btn.active{background:rgba(179,136,255,.15);color:var(--purple);border-color:rgba(179,136,255,.3)}
.imagery-dropdown{margin-top:8px;width:260px;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none}
.imagery-dropdown.open{display:block}
.imagery-dropdown-header{padding:10px 16px;border-bottom:1px solid var(--border);color:var(--purple);font-size:10px;font-weight:700;letter-spacing:.15em}
.imagery-option{display:block;width:100%;padding:8px 12px;background:transparent;border:none;text-align:left;cursor:pointer;font-family:inherit;transition:.15s}
.imagery-option:hover{background:rgba(255,255,255,.04)}
.imagery-option.active{background:rgba(179,136,255,.12);color:var(--purple)}
.imagery-option .io-name{font-size:10px;font-weight:700;color:inherit}
.imagery-option .io-meta{font-size:9px;color:#555;margin-top:2px}

/* Spectral / NDVI panel */
.spectral-toggle{position:absolute;top:16px;right:460px;z-index:1000}
.spectral-btn{padding:8px 12px;border-radius:8px;font-size:10px;font-family:inherit;background:rgba(0,0,0,.7);color:#888;border:1px solid var(--border);cursor:pointer;letter-spacing:.08em;transition:.2s}
.spectral-btn.active{background:rgba(0,229,255,.15);color:var(--cyan);border-color:rgba(0,229,255,.3)}
.spectral-panel{margin-top:8px;width:300px;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none;max-height:420px;overflow-y:auto}
.spectral-panel.open{display:block}
.spectral-panel-header{padding:10px 16px;border-bottom:1px solid var(--border);color:var(--cyan);font-size:10px;font-weight:700;letter-spacing:.15em;display:flex;justify-content:space-between;align-items:center}
.spectral-combos{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.combo-btn{padding:4px 8px;border-radius:4px;font-size:9px;font-family:inherit;background:transparent;color:#555;border:1px solid transparent;cursor:pointer;transition:.2s}
.combo-btn.active{background:rgba(0,229,255,.12);color:var(--cyan);border-color:rgba(0,229,255,.3)}
.spectral-search-btn{padding:4px 10px;border-radius:4px;font-size:9px;font-family:inherit;background:rgba(0,229,255,.15);color:var(--cyan);border:1px solid rgba(0,229,255,.3);cursor:pointer}
.spectral-search-btn:hover{background:rgba(0,229,255,.25)}
.spectral-scenes{padding:4px 0}
.scene-item{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.scene-item:hover{background:rgba(255,255,255,.04)}
.scene-item.active{background:rgba(0,229,255,.08)}
.scene-item .scene-date{font-size:10px;font-weight:600;color:#ccc}
.scene-item .scene-meta{font-size:9px;color:#555;margin-top:2px}
.spectral-status{padding:8px 12px;font-size:9px;color:#444;text-align:center}

/* Layer toggles */
.layer-toggles{position:absolute;bottom:70px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:4px}
.layer-toggle{padding:6px 12px;border-radius:4px;font-size:10px;font-family:inherit;letter-spacing:.08em;background:rgba(0,0,0,.5);color:#555;border:1px solid transparent;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.layer-toggle.on{border-color:rgba(0,229,255,.25)}

/* Timeline */
.timeline{position:absolute;bottom:0;left:320px;right:0;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:1000;display:flex;align-items:center;gap:16px;padding:10px 20px}
.tl-controls{display:flex;align-items:center;gap:8px}
.tl-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,229,255,.25);background:rgba(0,229,255,.08);color:var(--cyan);cursor:pointer;font-size:12px;font-family:inherit;transition:.2s}
.tl-btn:hover{background:rgba(0,229,255,.2)}
.tl-btn.playing{background:rgba(255,61,61,.12);border-color:rgba(255,61,61,.3);color:var(--red)}
.tl-skip{background:none;border:none;color:#555;cursor:pointer;font-size:14px;font-family:inherit}
.tl-skip:hover{color:#fff}
.tl-label{min-width:100px;font-size:11px;font-weight:700;letter-spacing:.1em}
.tl-label.live{color:var(--green)}
.tl-label.past{color:var(--amber)}
.tl-label.future{color:var(--cyan)}
.tl-slider{flex:1;display:flex;align-items:center;gap:8px}
.tl-slider span{font-size:9px;color:#555}
.tl-slider input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:#1a1a2e;border-radius:4px;outline:none;cursor:pointer}
.tl-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--cyan);cursor:pointer;box-shadow:0 0 8px rgba(0,229,255,.4)}
.tl-quick{display:flex;gap:4px}
.tl-qbtn{padding:4px 8px;border-radius:4px;font-size:9px;font-family:inherit;background:transparent;color:#555;border:none;cursor:pointer;transition:.2s}
.tl-qbtn.active{background:rgba(0,229,255,.15);color:var(--cyan)}
.tl-qbtn:hover{color:#999}

/* Status bar */
.status-bar{position:absolute;bottom:52px;left:340px;font-size:10px;color:#444;z-index:1000;display:flex;align-items:center;gap:8px}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.status-dot.loading{background:var(--amber);animation:pulse 1s infinite}
.status-dot.error{background:var(--red)}

/* Scan line */
.scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,229,255,.15),transparent);animation:scanmove 4s linear infinite;pointer-events:none;z-index:9999}
@keyframes scanmove{0%{top:0}100%{top:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sidebar-header .src-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.sidebar-header .src-tag{font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(0,229,255,.08);color:var(--cyan);border:1px solid rgba(0,229,255,.15)}
.sidebar-header .src-tag.live{background:rgba(0,255,136,.08);color:var(--green);border-color:rgba(0,255,136,.15)}
.sidebar-header .src-tag.warn{background:rgba(255,61,61,.08);color:var(--red);border-color:rgba(255,61,61,.15)}
.stats-panel{position:absolute;bottom:52px;right:16px;z-index:1000;display:flex;gap:12px;font-size:9px;color:#555}
.stat-item{display:flex;align-items:center;gap:4px}
.stat-item .stat-val{color:var(--cyan);font-weight:600;font-variant-numeric:tabular-nums}
/* Sidebar collapse */
.sidebar{transition:width .25s ease,min-width .25s ease,padding .25s ease,border .25s ease}
.sidebar.collapsed{width:0;min-width:0;padding:0;border:none;overflow:hidden}
.sidebar.collapsed *{opacity:0;pointer-events:none;transition:opacity .15s}
.sidebar-toggle{background:none;border:none;color:#555;cursor:pointer;font-size:12px;padding:2px 6px;margin-left:auto;transition:color .2s}
.sidebar-toggle:hover{color:var(--cyan)}
#sidebarExpand{position:absolute;top:16px;left:16px;z-index:1002;background:rgba(0,0,0,.85);border:1px solid var(--border);border-radius:8px;color:#888;cursor:pointer;font-size:11px;font-family:inherit;padding:8px 14px;display:none;letter-spacing:.1em;backdrop-filter:blur(8px);transition:all .2s}
#sidebarExpand:hover{color:var(--cyan);border-color:rgba(0,229,255,.3)}
/* SAT/SHIP mode toggles */
.mode-toggles{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:6px}
.mode-btn{padding:8px 18px;border-radius:8px;font-size:11px;font-weight:700;font-family:inherit;letter-spacing:.1em;background:rgba(0,0,0,.75);border:1px solid var(--border);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;backdrop-filter:blur(8px)}
.mode-btn.sat{color:#555}.mode-btn.sat.active{background:rgba(0,229,255,.12);color:var(--cyan);border-color:rgba(0,229,255,.3);box-shadow:0 0 12px rgba(0,229,255,.15)}
.mode-btn.ship{color:#555}.mode-btn.ship.active{background:rgba(255,171,0,.12);color:var(--amber);border-color:rgba(255,171,0,.3);box-shadow:0 0 12px rgba(255,171,0,.15)}
/* God's Eye crosshair */
.gods-eye-crosshair{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;display:none}
.gods-eye-crosshair.active{display:block}
.crosshair-h,.crosshair-v{position:absolute;background:rgba(0,229,255,.18)}
.crosshair-h{top:50%;left:0;right:0;height:1px}
.crosshair-v{left:50%;top:0;bottom:0;width:1px}
.crosshair-info{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);border:1px solid rgba(0,229,255,.25);border-radius:6px;padding:8px 16px;font-size:10px;color:var(--cyan);white-space:nowrap;backdrop-filter:blur(10px);letter-spacing:.05em}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 style="display:flex;align-items:center;gap:6px">SAT-INTEL<button class="sidebar-toggle" id="sidebarCollapse" title="Collapse sidebar">&#x25C0;</button></h1>
      <p id="objCount">Loading...</p>
      <div class="src-tags">
        <span class="src-tag live">CelesTrak TLE</span>
        <span class="src-tag live">USGS Quakes</span>
        <span class="src-tag live">NASA EONET</span>
        <span class="src-tag">NASA GIBS</span>
        <span class="src-tag">ESRI Imagery</span>
        <span class="src-tag warn">GPS Jamming</span>
        <span class="src-tag">ADS-B</span>
        <span class="src-tag live" id="aisTag">AIS Live</span>
        <span class="src-tag">AISStream</span>
        <span class="src-tag">BarentsWatch</span>
        <span class="src-tag">AISHub</span>
        <span class="src-tag">Sentinel-2 STAC</span>
      </div>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="country-bar" id="countryBar"></div>
    <div class="search-box">
      <input id="searchInput" placeholder="Search name, NORAD ID, or country..."/>
      <div class="search-count" id="searchCount"></div>
    </div>
    <div class="sat-list" id="satList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="map" style="width:100%;height:100%"></div>

    <!-- Mode Toggles -->
    <div class="mode-toggles" id="modeToggles">
      <button class="mode-btn sat active" id="satToggle">&#x1F6F0;&#xFE0F; SAT</button>
      <button class="mode-btn ship active" id="shipToggle">&#x1F6A2; SHIP</button>
    </div>

    <!-- Sidebar Expand -->
    <button id="sidebarExpand">&#x25B6; INTEL</button>

    <!-- God's Eye Crosshair -->
    <div class="gods-eye-crosshair" id="godsEyeCrosshair">
      <div class="crosshair-h"></div>
      <div class="crosshair-v"></div>
      <div class="crosshair-info" id="crosshairInfo"></div>
    </div>

    <!-- Country Dashboard -->
    <div class="country-dash" id="countryDash">
      <div class="country-dash-header">&#x1F4CA; NATION INTELLIGENCE</div>
      <div class="country-dash-body" id="countryDashBody"></div>
      <div class="country-dash-footer" id="countryDashFooter"></div>
    </div>

    <!-- Tracking HUD -->
    <div class="hud" id="hud">
      <div class="hud-header">
        <span>&#x1F3AF; TRACKING LOCKED</span>
        <button class="hud-close" id="hudClose">&times;</button>
      </div>
      <div class="hud-name"><div class="sat-n" id="hudName"></div><div class="sat-o" id="hudOwner"></div></div>
      <div class="hud-grid" id="hudGrid"></div>
      <div class="hud-progress">
        <div class="bar-label"><span>ORBIT PROGRESS</span><span id="hudPct"></span></div>
        <div class="bar"><div class="bar-fill" id="hudBar"></div></div>
      </div>
    </div>

    <!-- Imagery Panel -->
    <div class="imagery-toggle" id="imageryToggle">
      <button class="imagery-btn" id="imageryBtn">&#x1F6F0; NASA GIBS</button>
      <div class="imagery-dropdown" id="imageryDropdown"></div>
    </div>

    <!-- Spectral / NDVI Panel -->
    <div class="spectral-toggle" id="spectralToggle">
      <button class="spectral-btn" id="spectralBtn">&#x1F6F0; GOD'S EYE</button>
      <div class="spectral-panel" id="spectralPanel">
        <div class="spectral-panel-header">
          <span>GOD'S EYE &middot; HD IMAGERY</span>
          <button class="spectral-search-btn" id="spectralSearchBtn">&#x1F50D; SEARCH AREA</button>
        </div>
        <div class="spectral-combos" id="spectralCombos"></div>
        <div class="spectral-scenes" id="spectralScenes"></div>
        <div class="spectral-status" id="spectralStatus">Pan map &amp; click SEARCH AREA</div>
      </div>
    </div>

    <!-- Layer Toggles -->
    <div class="layer-toggles" id="layerToggles"></div>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <div class="status-dot loading" id="statusDot"></div>
      <span id="statusText">INITIALIZING...</span>
    </div>

    <!-- Stats -->
    <div class="stats-panel" id="statsPanel"></div>

    <!-- Timeline -->
    <div class="timeline">
      <div class="tl-controls">
        <button class="tl-skip" id="tlBack" title="T-60">&#x23EE;</button>
        <button class="tl-btn" id="tlPlay">&#x25B6;</button>
        <button class="tl-skip" id="tlFwd" title="T+60">&#x23ED;</button>
      </div>
      <div class="tl-label live" id="tlLabel">LIVE</div>
      <div class="tl-slider">
        <span>T-60</span>
        <input type="range" id="tlSlider" min="-60" max="60" value="0"/>
        <span>T+60</span>
      </div>
      <div class="tl-quick" id="tlQuick"></div>
    </div>

    <div class="scan-line"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>

// ── Orbit Propagation (satellite.js) ──
var satelliteLib = window.satellite;

function getSatPos(tle1, tle2, date){
  try{
    var satrec = satelliteLib.twoline2satrec(tle1, tle2);
    var pv = satelliteLib.propagate(satrec, date || new Date());
    if(!pv.position || typeof pv.position === "boolean") return null;
    var gmst = satelliteLib.gstime(date || new Date());
    var gd = satelliteLib.eciToGeodetic(pv.position, gmst);
    var vel = pv.velocity;
    var v = Math.sqrt(vel.x*vel.x + vel.y*vel.y + vel.z*vel.z);
    return {lat: satelliteLib.degreesLat(gd.latitude), lng: satelliteLib.degreesLong(gd.longitude), alt: gd.height, velocity: v};
  }catch(e){return null}
}

function getOrbitPath(tle1, tle2, steps){
  steps = steps || 200;
  try{
    var satrec = satelliteLib.twoline2satrec(tle1, tle2);
    var period = (2*Math.PI)/satrec.no; // minutes
    var now = Date.now();
    var path = [];
    for(var i=0;i<=steps;i++){
      var t = new Date(now + (i/steps)*period*60000);
      var pv = satelliteLib.propagate(satrec, t);
      if(!pv.position || typeof pv.position === "boolean") continue;
      var gmst = satelliteLib.gstime(t);
      var gd = satelliteLib.eciToGeodetic(pv.position, gmst);
      path.push([satelliteLib.degreesLat(gd.latitude), satelliteLib.degreesLong(gd.longitude)]);
    }
    return path;
  }catch(e){return []}
}

function getCoverageFootprint(lat, lng, altKm, pts){
  pts = pts || 64;
  var R = 6371;
  var ha = Math.acos(R/(R+altKm));
  var fp = [];
  for(var i=0;i<=pts;i++){
    var b = (i/pts)*2*Math.PI;
    var latR = Math.asin(Math.sin(lat*Math.PI/180)*Math.cos(ha)+Math.cos(lat*Math.PI/180)*Math.sin(ha)*Math.cos(b));
    var lngR = lng*Math.PI/180 + Math.atan2(Math.sin(b)*Math.sin(ha)*Math.cos(lat*Math.PI/180), Math.cos(ha)-Math.sin(lat*Math.PI/180)*Math.sin(latR));
    fp.push([latR*180/Math.PI, lngR*180/Math.PI]);
  }
  return fp;
}

function classifyOrbit(alt){
  if(alt<2000) return "LEO";
  if(alt<35786) return "MEO";
  if(alt<=35800) return "GEO";
  return "HEO";
}

function getOrbitalPeriod(tle1, tle2){
  try{var sr=satelliteLib.twoline2satrec(tle1,tle2);return(2*Math.PI)/sr.no}catch(e){return 90}
}

function guessOwner(name){

  if(n.includes("BEIDOU")||n.includes("YAOGAN")||n.includes("CZ-")||n.includes("TIANGONG")||n.includes("TIANHE")||n.includes("FENGYUN")||n.includes("GAOFEN")||n.includes("JILIN")||n.includes("SHIJIAN")||n.includes("WENTIAN")||n.includes("MENGTIAN")||n.includes("SHENZHOU")||n.includes("TIANLIAN")) return "CN";
  if(n.includes("GLONASS")||n.includes("COSMOS")||n.includes("MOLNIYA")||n.includes("PROGRESS")||n.includes("SOYUZ")||n.includes("ELEKTRO")||n.includes("KANOPUS")||n.includes("LUCH")) return "RU";
  if(n.includes("GALILEO")||n.includes("SENTINEL")||n.includes("METOP")||n.includes("MSG ")||n.includes("COPERNICUS")||n.includes("AEOLUS")||n.includes("SWARM")||n.includes("ENVISAT")) return "EU";
  if(n.includes("IRNSS")||n.includes("GSAT")||n.includes("CARTOSAT")||n.includes("ASTROSAT")||n.includes("OCEANSAT")||n.includes("RISAT")||n.includes("EOS-")||n.includes("RESOURCESAT")) return "IN";
  if(n.includes("QZSS")||n.includes("HIMAWARI")||n.includes("ALOS")||n.includes("HAYABUSA")||n.includes("GOSAT")) return "JP";
  if(n.includes("KOMPSAT")||n.includes("KOREASAT")||n.includes("ANASIS")) return "KR";
  if(n.includes("TURKSAT")||n.includes("GOKTURK")) return "TR";
  if(n.includes("EROS")||n.includes("OFEQ")||n.includes("TECSAR")) return "IL";
  if(n.includes("SPOT ")||n.includes("PLEIADES")||n.includes("CSO-")||n.includes("HELIOS")) return "FR";
  if(n.includes("SARAH")||n.includes("ENMAP")||n.includes("SAR-LUPE")) return "DE";
  if(n.includes("RADARSAT")||n.includes("SCISAT")) return "CA";
  if(n.includes("COSMO-SKYMED")) return "IT";
  if(n.includes("ONEWEB")) return "UK";
  if(n.includes("PLANET")||n.includes("FLOCK")||n.includes("SKYSAT")||n.includes("SPIRE")||n.includes("LEMUR")) return "US";
  if(n.includes("ISS")||n.includes("HUBBLE")) return "US";
  return "US";
}

function getCountryInfo(code){

}

// ── Render Satellites (chunked for performance) ──
var _renderChunkId = 0;
function renderSatellites(){
  cancelAnimationFrame(_renderChunkId);
  if(!state.showSatellites){
    Object.keys(markers).forEach(function(k){map.removeLayer(markers[k])});
    markers={};
    return;
  }
  var now = new Date(Date.now() + state.timelineOffset*60000);
  var max = Math.min(state.satellites.length, 2000);
  var idx = 0;
  var CHUNK = 150;
  function doChunk(){
    var end = Math.min(idx + CHUNK, max);
    for(var i=idx;i<end;i++){
      var sat = state.satellites[i];
      var pos = getSatPos(sat.line1, sat.line2, now);
      if(!pos || isNaN(pos.lat) || isNaN(pos.lng)) continue;
      var locked = sat.noradId === state.lockedId;
      var oc = guessOwner(sat.name);
      var oi = getCountryInfo(oc);
      var m = markers[sat.noradId];
      if(!m){
        m = L.marker([pos.lat, pos.lng],{icon:satIcon(oi.color, locked?28:16, locked)});
        (function(s){m.on("click",function(){toggleLock(s.noradId)})})(sat);
        m.addTo(map);
        markers[sat.noradId] = m;
        m._wasLocked = locked;
      } else {
        m.setLatLng([pos.lat, pos.lng]);
        if(locked !== m._wasLocked){
          m.setIcon(satIcon(oi.color, locked?28:16, locked));
          m._wasLocked = locked;
        }
      }
      if(!m._popBound){
        m._popBound=true;
        (function(s,mk){
          mk.on("mouseover",function(){
            var p2=getSatPos(s.line1,s.line2,new Date(Date.now()+state.timelineOffset*60000));
            if(p2){var oc2=guessOwner(s.name);var oi2=getCountryInfo(oc2);var ot2=classifyOrbit(p2.alt);mk.bindPopup(popupHtml(s,p2,oi2,ot2),{className:"intel-popup",maxWidth:300})}
          });
        })(sat,m);
      }
    }
    idx = end;
    if(idx < max) _renderChunkId = requestAnimationFrame(doChunk);
  }
  _renderChunkId = requestAnimationFrame(doChunk);
}

function clearOrbitLines(){
  orbitLines.forEach(function(l){map.removeLayer(l)});
  orbitLines=[];
}
function clearCoverage(){
  coveragePolys.forEach(function(p){map.removeLayer(p)});
  coveragePolys=[];
}

function renderLockedOverlays(){
  clearOrbitLines();
  clearCoverage();
  if(!state.lockedId) return;
  var sat = state.satellites.find(function(s){return s.noradId===state.lockedId});
  if(!sat) return;
  var now = new Date(Date.now()+state.timelineOffset*60000);
  var pos = getSatPos(sat.line1, sat.line2, now);
  if(!pos) return;
  var oc = guessOwner(sat.name);
  var oi = getCountryInfo(oc);

  // Orbit path
  if(state.showOrbits){
    var path = getOrbitPath(sat.line1, sat.line2, 200);
    if(path.length>1){
      var segs=[[]];
      for(var i=1;i<path.length;i++){
        if(Math.abs(path[i][1]-path[i-1][1])>180) segs.push([]);
        segs[segs.length-1].push(path[i]);
      }
      segs.forEach(function(seg){
        if(seg.length<2) return;
        var ln=L.polyline(seg,{color:oi.color,weight:1.5,opacity:0.6,dashArray:"4 4"}).addTo(map);
        orbitLines.push(ln);
      });
    }
  }

  // Coverage
  if(state.showCoverage){
    var fp = getCoverageFootprint(pos.lat, pos.lng, pos.alt);
    if(fp.length>0){
      var poly=L.polygon(fp,{color:oi.color,fillColor:oi.color,fillOpacity:0.06,weight:1,opacity:0.3}).addTo(map);
      coveragePolys.push(poly);
    }
  }

  // Fly to
  map.setView([pos.lat, pos.lng], map.getZoom(), {animate:true});
}

// ── Jamming Zones ──
function renderJamming(){
  jammingCircles.forEach(function(c){map.removeLayer(c)});
  jammingPulses.forEach(function(c){map.removeLayer(c)});
  jammingCircles=[];jammingPulses=[];
  cancelAnimationFrame(pulseAnim);
  if(!state.showJamming) return;
  var sevColors={high:"#ff3d3d",medium:"#ffab00",low:"#facc15"};
  JAMMING_ZONES.forEach(function(z){
    var c=sevColors[z.severity];
    var circle=L.circle(z.center,{radius:z.radiusKm*1000,color:c,fillColor:c,fillOpacity:0.08,weight:1.5,dashArray:"6 4"}).addTo(map);
    circle.bindPopup('<div style="font-family:monospace;font-size:11px;color:#fff;background:#111;padding:8px;border-radius:4px"><div style="color:'+c+';font-weight:bold">'+z.type+' JAMMING</div><div>'+z.name+'</div><div>Radius: '+z.radiusKm+'km</div><div>Severity: '+z.severity.toUpperCase()+'</div>'+(z.source?'<div style="color:#888">SRC: '+z.source+'</div>':'')+'</div>',{className:"intel-popup"});
    jammingCircles.push(circle);
    var pulse=L.circle(z.center,{radius:z.radiusKm*1000,color:c,fillColor:"transparent",weight:2,opacity:0}).addTo(map);
    jammingPulses.push(pulse);
  });
  pulsePhase=0;
  function animPulse(){
    pulsePhase=(pulsePhase+0.02)%1;
    jammingPulses.forEach(function(p,i){
      var z=JAMMING_ZONES[i]; if(!z) return;
      p.setRadius(z.radiusKm*1000*(0.6+pulsePhase*0.4));
      p.setStyle({opacity:0.5*(1-pulsePhase)});
    });
    pulseAnim=requestAnimationFrame(animPulse);
  }
  pulseAnim=requestAnimationFrame(animPulse);
}

// ── ADS-B Flights ──
function renderFlights(){
  Object.keys(flightMarkers).forEach(function(k){map.removeLayer(flightMarkers[k])});
  Object.keys(flightLines).forEach(function(k){map.removeLayer(flightLines[k])});
  flightMarkers={};flightLines={};
  if(!state.showFlights) return;
  ADSB_FLIGHTS.forEach(function(f){
    var last=f.path[f.path.length-1];
    var m=L.marker(last,{icon:flightIcon(f.diverted)}).addTo(map);
    m.bindPopup('<div style="font-family:monospace;font-size:11px;color:#fff;background:#111;padding:8px;border-radius:4px"><div style="color:'+(f.diverted?"#ff3d3d":"#00e5ff")+';font-weight:bold">'+f.callsign+'</div><div>Type: '+f.type+'</div>'+(f.diverted?'<div style="color:#ff3d3d">&#x26A0; DIVERTED</div>':'')+'</div>',{className:"intel-popup"});
    flightMarkers[f.id]=m;
    var ln=L.polyline(f.path,{color:f.diverted?"#ff3d3d":"#00e5ff",weight:1.5,opacity:0.5,dashArray:f.diverted?"8 4":undefined}).addTo(map);
    flightLines[f.id]=ln;
  });
}

// ── AIS Vessels (live from server, viewport-culled, smooth) ──
var _vesselTypeColors={warship:"#ff1744",cargo:"#42a5f5",tanker:"#ff7043",passenger:"#66bb6a",fishing:"#fdd835",tug:"#ab47bc",military:"#ff1744",research:"#00bcd4","high speed":"#e91e63",sar:"#76ff03",unknown:"#78909c"};
var _vesselRenderTimer=0;
function renderVessels(){
  cancelAnimationFrame(_vesselRenderTimer);
  _vesselRenderTimer=requestAnimationFrame(_renderVesselsNow);
}
function _renderVesselsNow(){
  if(!state.showVessels){
    Object.keys(vesselMarkers).forEach(function(k){map.removeLayer(vesselMarkers[k])});
    vesselMarkers={};
    return;
  }
  var ships = state.liveShips.length > 0 ? state.liveShips : AIS_VESSELS;
  var isLive = state.liveShips.length > 0;
  var bounds = map.getBounds().pad(0.3);
  var newKeys = {};
  var count = 0;
  var zoom = map.getZoom();
  var maxVisible = zoom >= 8 ? 1200 : zoom >= 5 ? 600 : 300;
  for(var i=0;i<ships.length;i++){
    var v=ships[i];
    var lat = v.lat || v.latitude;
    var lng = v.lng || v.lon || v.longitude;
    if(!lat || !lng) continue;
    var key = v.mmsi||v.id||("v_"+lat+"_"+lng);
    newKeys[key] = true;
    if(!bounds.contains([lat,lng])) continue;
    if(count++ >= maxVisible) continue;
    var vtype = v.type || "unknown";
    var m = vesselMarkers[key];
    if(m){
      m.setLatLng([lat,lng]);
      if(m._vCourse !== (v.course||0)){
        m.setIcon(vesselIcon(vtype, v.course));
        m._vCourse = v.course||0;
      }
    } else {
      m = L.marker([lat,lng],{icon:vesselIcon(vtype, v.course)}).addTo(map);
      m._vCourse = v.course||0;
      vesselMarkers[key] = m;
      (function(vessel,marker,live){
        marker.on("mouseover",function(){
          var nameStr=vessel.name||vessel.mmsi||"Unknown";
          var countryStr=vessel.country||vessel.flag||"";
          var srcStr=vessel.source||(live?"AIS":"Static");
          var tc=_vesselTypeColors[String(vessel.type||"").toLowerCase()]||"#78909c";
          var typeLabel=(vessel.type||"Unknown").toUpperCase();
          marker.bindPopup('<div style="font-family:monospace;font-size:11px;color:#fff;background:#0d0d0d;padding:10px;border-radius:6px;border:1px solid '+tc+'33">'
            +'<div style="border-left:3px solid '+tc+';padding-left:8px;margin-bottom:4px"><span style="color:'+tc+';font-weight:bold;font-size:12px">'+countryStr+' '+nameStr+'</span></div>'
            +'<div style="display:grid;grid-template-columns:auto 1fr;gap:2px 8px;margin-top:4px">'
            +'<span style="color:#666">TYPE</span><span style="color:'+tc+'">'+typeLabel+'</span>'
            +'<span style="color:#666">HDG</span><span>'+(vessel.course||0)+'&deg;</span>'
            +'<span style="color:#666">SPD</span><span>'+(vessel.speed||0)+' kn</span>'
            +(vessel.mmsi?'<span style="color:#666">MMSI</span><span style="color:#888">'+vessel.mmsi+'</span>':'')
            +'</div>'
            +'<div style="color:#555;font-size:9px;margin-top:5px;border-top:1px solid #222;padding-top:4px">SRC: '+srcStr+'</div>'
            +'</div>',{className:"intel-popup"}).openPopup();
        });
      })(v,m,isLive);
    }
  }
  var keys=Object.keys(vesselMarkers);
  for(var j=0;j<keys.length;j++){
    if(!newKeys[keys[j]]){map.removeLayer(vesselMarkers[keys[j]]);delete vesselMarkers[keys[j]]}
  }
}

function fetchShips(){
  fetch("/api/ships")
    .then(function(r){if(!r.ok) throw new Error("HTTP "+r.status); return r.json()})
    .then(function(data){
      if(data.ships && data.ships.length > 0){
        state.liveShips = data.ships;
        state.shipSources = data.sources || {};
        renderVessels();
        updateStats();
      }
    })
    .catch(function(err){console.debug("Ships fetch:",err)});
}

// ── God's Eye / HD Imagery (real tile layers + STAC) ──
var spectralLayer = null;
var godsEyeLayer = null;
var godsEyeActive = "";

var GODS_EYE_MODES = [
  {id:"s2hd",label:"TRUE COLOR HD",desc:"Sentinel-2 Cloudless 10m Resolution"},
  {id:"ndvi",label:"NDVI",desc:"MODIS 8-Day Vegetation Index 250m"},
  {id:"fires_hd",label:"ACTIVE FIRES",desc:"VIIRS 375m Thermal Anomalies"},
  {id:"night_hd",label:"NIGHT LIGHTS",desc:"VIIRS Day/Night Band"}
];

function ndviDate8(){
  var d=new Date();d.setDate(d.getDate()-10);
  var y=d.getFullYear(),m0=new Date(y,0,1);
  var doy=Math.floor((d-m0)/86400000)+1;
  var p=Math.floor((doy-1)/8)*8+1;
  var r=new Date(m0.getTime()+(p-1)*86400000);
  return r.toISOString().split("T")[0];
}

function buildSpectralCombos(){
  var el=document.getElementById("spectralCombos");el.innerHTML="";
  GODS_EYE_MODES.forEach(function(m){
    var btn=document.createElement("button");
    btn.className="combo-btn"+(godsEyeActive===m.id?" active":"");
    btn.textContent=m.label;
    btn.title=m.desc;
    btn.onclick=function(){toggleGodsEyeLayer(m.id)};
    el.appendChild(btn);
  });
}

function toggleGodsEyeLayer(id){
  if(godsEyeLayer){map.removeLayer(godsEyeLayer);godsEyeLayer=null}
  var ch=document.getElementById("godsEyeCrosshair");
  if(godsEyeActive===id){
    godsEyeActive="";
    if(ch) ch.classList.remove("active");
    buildSpectralCombos();
    updateGodsEyeInfo();
    return;
  }
  godsEyeActive=id;
  if(ch) ch.classList.add("active");
  var dt=gibsDate();
  if(id==="s2hd"){
    godsEyeLayer=L.tileLayer("https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2021_3857/default/GoogleMapsCompatible/{z}/{y}/{x}.jpg",{maxZoom:15,opacity:0.92}).addTo(map);
  } else if(id==="ndvi"){
    godsEyeLayer=L.tileLayer("https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_NDVI_8Day/default/"+ndviDate8()+"/GoogleMapsCompatible_Level9/{z}/{y}/{x}.png",{maxZoom:9,opacity:0.85}).addTo(map);
  } else if(id==="fires_hd"){
    godsEyeLayer=L.tileLayer("https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_SNPP_Thermal_Anomalies_375m_Day/default/"+dt+"/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png",{maxZoom:8,opacity:0.85}).addTo(map);
  } else if(id==="night_hd"){
    godsEyeLayer=L.tileLayer("https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_SNPP_DayNightBand_ENCC/default/"+dt+"/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png",{maxZoom:8,opacity:0.85}).addTo(map);
  }
  buildSpectralCombos();
  updateGodsEyeInfo();
}

function updateGodsEyeInfo(){
  var el=document.getElementById("crosshairInfo");
  if(!el) return;
  if(!godsEyeActive){el.textContent="";return}
  var c=map.getCenter(),z=map.getZoom();
  var mpp=156543.03*Math.cos(c.lat*Math.PI/180)/Math.pow(2,z);
  var mode=GODS_EYE_MODES.find(function(m){return m.id===godsEyeActive})||{label:"?"};
  el.textContent=mode.label+" | "+c.lat.toFixed(4)+"\u00b0N "+c.lng.toFixed(4)+"\u00b0E | Z"+z+" ~"+(mpp<1000?mpp.toFixed(0)+"m/px":(mpp/1000).toFixed(1)+"km/px");
}

function searchSpectralScenes(){
  var bounds=map.getBounds();
  var bbox=[bounds.getWest().toFixed(4),bounds.getSouth().toFixed(4),bounds.getEast().toFixed(4),bounds.getNorth().toFixed(4)].join(",");
  var statusEl=document.getElementById("spectralStatus");
  statusEl.textContent="Searching Sentinel-2 scenes...";
  state.spectralLoading=true;
  fetch("/api/stac-search?bbox="+encodeURIComponent(bbox)+"&limit=8&max_cloud=20")
    .then(function(r){return r.json()})
    .then(function(data){
      state.spectralLoading=false;
      var features=data.features||[];
      state.spectralScenes=features;
      renderSpectralScenes();
      statusEl.textContent=features.length?features.length+" scenes found":"No clear scenes found — try a smaller area";
    })
    .catch(function(err){
      state.spectralLoading=false;
      statusEl.textContent="Search failed: "+err.message;
    });
}

function renderSpectralScenes(){
  var el=document.getElementById("spectralScenes"); el.innerHTML="";
  state.spectralScenes.forEach(function(f,idx){
    var props=f.properties||{};
    var dt=props.datetime||"";
    var cloud=props["eo:cloud_cover"];
    var div=document.createElement("div");
    div.className="scene-item"+(state.activeScene===f?" active":"");
    div.innerHTML='<div class="scene-date">'+(dt?new Date(dt).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}):"Unknown date")+'</div>'
      +'<div class="scene-meta">Cloud: '+(cloud!=null?cloud.toFixed(1)+"%":"N/A")+" &middot; "+f.id+'</div>';
    div.onclick=function(){
      state.activeScene=f;
      renderSpectralScenes();
      applySpectralOverlay(f);
    };
    el.appendChild(div);
  });
}

function applySpectralOverlay(feature){
  if(spectralLayer){map.removeLayer(spectralLayer);spectralLayer=null}
  if(!feature) return;
  var geom=feature.geometry;
  if(geom && geom.coordinates && geom.coordinates[0]){
    var coords=geom.coordinates[0].map(function(c){return [c[1],c[0]]});
    spectralLayer=L.polygon(coords,{color:"#00e5ff",fillColor:"#00e5ff",fillOpacity:0.1,weight:2,dashArray:"6 4"}).addTo(map);
    map.fitBounds(spectralLayer.getBounds(),{padding:[50,50]});
  } else if(feature.bbox && feature.bbox.length>=4){
    var bnds=[[feature.bbox[1],feature.bbox[0]],[feature.bbox[3],feature.bbox[2]]];
    spectralLayer=L.rectangle(bnds,{color:"#00e5ff",fillColor:"#00e5ff",fillOpacity:0.1,weight:2,dashArray:"6 4"}).addTo(map);
    map.fitBounds(bnds,{padding:[50,50]});
  }
  if(!godsEyeActive) toggleGodsEyeLayer("s2hd");
  document.getElementById("spectralStatus").textContent="Scene footprint shown \u00b7 HD view active";
}

function clearSpectralOverlay(){
  if(spectralLayer){map.removeLayer(spectralLayer);spectralLayer=null}
  state.activeScene=null;
  renderSpectralScenes();
}

function updateHUD(){
  var hud=document.getElementById("hud");
  if(!state.lockedId){hud.classList.remove("open");return}
  var sat=state.satellites.find(function(s){return s.noradId===state.lockedId});
  if(!sat){hud.classList.remove("open");return}
  hud.classList.add("open");
  var now=new Date(Date.now()+state.timelineOffset*60000);
  var pos=getSatPos(sat.line1, sat.line2, now);
  if(!pos) return;
  var oc=guessOwner(sat.name), oi=getCountryInfo(oc), ot=classifyOrbit(pos.alt), period=getOrbitalPeriod(sat.line1,sat.line2);
  document.getElementById("hudName").textContent=sat.name;
  document.getElementById("hudOwner").textContent=oi.flag+" "+oi.name;
  document.getElementById("hudGrid").innerHTML=[
    row("NORAD ID",sat.noradId),row("ORBIT",ot),
    row("LATITUDE",pos.lat.toFixed(4)+"°"),row("LONGITUDE",pos.lng.toFixed(4)+"°"),
    row("ALTITUDE",pos.alt.toFixed(1)+" km",true),row("VELOCITY",pos.velocity.toFixed(2)+" km/s",true),
    row("PERIOD",period.toFixed(1)+" min")
  ].join("");
  var pct=((Date.now()%(period*60000))/(period*60000)*100);
  document.getElementById("hudPct").textContent=pct.toFixed(0)+"%";
  document.getElementById("hudBar").style.width=pct+"%";
}
function row(lbl,val,hl){return '<div class="hud-row"><span class="lbl">'+lbl+'</span><span class="val'+(hl?" hl":"")+'">'+val+'</span></div>'}

    {label:"ORBITS",key:"showOrbits",color:"var(--cyan)"},
    {label:"COVERAGE",key:"showCoverage",color:"var(--green)"},

    {label:"AIS",key:"showVessels",color:"var(--amber)"},

function toggleLock(id){

  // Update marker icons
  Object.keys(markers).forEach(function(nid){
    var m=markers[nid];
    var sat=state.satellites.find(function(s){return s.noradId===nid});
    if(!sat) return;
    var locked=nid===state.lockedId;
    if(locked!==m._wasLocked){
      var oc=guessOwner(sat.name);
      var oi=getCountryInfo(oc);
      m.setIcon(satIcon(oi.color, locked?28:16, locked));
      m._wasLocked=locked;
    }
  });
}

function clearAllMarkers(){
  Object.keys(markers).forEach(function(k){map.removeLayer(markers[k])});
  markers={};
  clearOrbitLines();
  clearCoverage();
}

function setStatus(loading, text){
  var dot=document.getElementById("statusDot");
  dot.className="status-dot"+(loading?" loading":"");
  document.getElementById("statusText").textContent=text;
}

// ── Fetch TLE ──
function fetchTLE(){
  state.loading=true;
  setStatus(true,"FETCHING TLE...");
  fetch("/api/tle?category="+encodeURIComponent(state.category))
    .then(function(r){if(!r.ok) throw new Error("HTTP "+r.status); return r.json()})
    .then(function(data){
      if(data.satellites && data.satellites.length>0){
        state.satellites=data.satellites;
        var src=data.source||"LIVE";
        var label=src==="fallback"?"FALLBACK":"LIVE";
        document.getElementById("objCount").textContent=data.count.toLocaleString()+" OBJECTS TRACKED · "+label;
        renderSatList();
        renderSatellites();
        renderCountryDash();
        buildLayerToggles();
        updateStats();
        setStatus(false, data.count.toLocaleString()+" OBJECTS · "+label+" SGP4 PROPAGATION");
      }
    })
    .catch(function(err){
      console.error("TLE fetch failed:",err);
      setStatus(false,"ERROR: "+err.message);
      document.getElementById("statusDot").classList.add("error");
    })
    .finally(function(){state.loading=false});
}

function fetchQuakes(){
  fetch("/api/quakes")
    .then(function(r){if(!r.ok) throw new Error("HTTP "+r.status); return r.json()})
    .then(function(data){
      state.quakes=data.quakes||[];
      renderQuakes();
      updateStats();
    })
    .catch(function(err){console.error("Quakes fetch:",err)});
}

function fetchEvents(){
  fetch("/api/events")
    .then(function(r){if(!r.ok) throw new Error("HTTP "+r.status); return r.json()})
    .then(function(data){
      state.events=data.events||[];
      renderEvents();
      updateStats();
    })
    .catch(function(err){console.error("Events fetch:",err)});
}

// ── Main init ──
function init(){
  initMap();
  buildCatTabs();
  buildCountryBar();
  buildImageryPanel();
  buildLayerToggles();
  buildTimeline();
  updateTimelineLabel();

  // Search
  document.getElementById("searchInput").oninput=function(e){state.search=e.target.value;renderSatList()};

  // HUD close
  document.getElementById("hudClose").onclick=function(){state.lockedId=null;renderSatList();renderLockedOverlays();updateHUD();
    Object.keys(markers).forEach(function(nid){var m=markers[nid];if(m._wasLocked){var sat=state.satellites.find(function(s){return s.noradId===nid});if(sat){var oc=guessOwner(sat.name);var oi=getCountryInfo(oc);m.setIcon(satIcon(oi.color,16,false));m._wasLocked=false}}});
  };

  // Imagery toggle
  document.getElementById("imageryBtn").onclick=function(){
    var dd=document.getElementById("imageryDropdown");
    dd.classList.toggle("open");
    document.getElementById("imageryBtn").classList.toggle("active",dd.classList.contains("open"));
  };

  // Spectral / God's Eye panel
  buildSpectralCombos();
  document.getElementById("spectralBtn").onclick=function(){
    var panel=document.getElementById("spectralPanel");
    panel.classList.toggle("open");
    document.getElementById("spectralBtn").classList.toggle("active",panel.classList.contains("open"));
  };
  document.getElementById("spectralSearchBtn").onclick=function(){
    searchSpectralScenes();
  };

  // Sidebar collapse
  document.getElementById("sidebarCollapse").onclick=function(){
    var sb=document.getElementById("sidebar");
    var exp=document.getElementById("sidebarExpand");
    sb.classList.add("collapsed");
    exp.style.display="block";
    document.querySelector(".timeline").style.left="0";
    document.querySelector(".status-bar").style.left="20px";
    setTimeout(function(){map.invalidateSize()},300);
  };
  document.getElementById("sidebarExpand").onclick=function(){
    var sb=document.getElementById("sidebar");
    sb.classList.remove("collapsed");
    this.style.display="none";
    document.querySelector(".timeline").style.left="320px";
    document.querySelector(".status-bar").style.left="340px";
    setTimeout(function(){map.invalidateSize()},300);
  };

  // SAT/SHIP mode toggles
  document.getElementById("satToggle").onclick=function(){
    state.showSatellites=!state.showSatellites;
    this.classList.toggle("active",state.showSatellites);
    if(!state.showSatellites){
      Object.keys(markers).forEach(function(k){map.removeLayer(markers[k])});
      markers={};
      clearOrbitLines();clearCoverage();
    } else { renderSatellites(); }
  };
  document.getElementById("shipToggle").onclick=function(){
    state.showVessels=!state.showVessels;
    this.classList.toggle("active",state.showVessels);
    renderVessels();
  };

  // God's Eye map move + debounced vessel re-render
  var _moveTimer=0;
  map.on("moveend",function(){
    if(godsEyeActive) updateGodsEyeInfo();
    clearTimeout(_moveTimer);
    _moveTimer=setTimeout(renderVessels,120);
  });

  // Timeline controls
  document.getElementById("tlSlider").oninput=function(e){setTimeline(parseInt(e.target.value))};
  document.getElementById("tlBack").onclick=function(){setTimeline(-60)};
  document.getElementById("tlFwd").onclick=function(){setTimeline(60)};
  var playInterval=null;
  document.getElementById("tlPlay").onclick=function(){
    state.isPlaying=!state.isPlaying;
    var btn=document.getElementById("tlPlay");
    if(state.isPlaying){
      btn.innerHTML="&#x23F8;";btn.classList.add("playing");
      playInterval=setInterval(function(){
        state.timelineOffset++;
        if(state.timelineOffset>60){state.timelineOffset=60;state.isPlaying=false;btn.innerHTML="&#x25B6;";btn.classList.remove("playing");clearInterval(playInterval);return}
        document.getElementById("tlSlider").value=state.timelineOffset;
        updateTimelineLabel();buildTimeline();renderSatellites();renderLockedOverlays();updateHUD();
      },500);
    } else {
      btn.innerHTML="&#x25B6;";btn.classList.remove("playing");
      if(playInterval) clearInterval(playInterval);
    }
  };

  // Fetch data
  fetchTLE();
  renderJamming();
  renderFlights();
  renderVessels();
  fetchShips();
  renderStations();
  fetchQuakes();
  fetchEvents();
  updateStats();

  // Auto-refresh every 5 min
  setInterval(fetchTLE, 300000);
  // Refresh quakes & events every 10 min
  setInterval(fetchQuakes, 600000);
  setInterval(fetchEvents, 600000);
  // Refresh ships every 30s
  setInterval(fetchShips, 30000);

  // Live position update every 2s
  setInterval(function(){
    renderSatellites();
    updateHUD();
    // Update coverage for locked
    if(state.lockedId && state.showCoverage && coveragePolys.length>0){
      var sat=state.satellites.find(function(s){return s.noradId===state.lockedId});
      if(sat){
        var now=new Date(Date.now()+state.timelineOffset*60000);
        var pos=getSatPos(sat.line1, sat.line2, now);
        if(pos){
          var fp=getCoverageFootprint(pos.lat, pos.lng, pos.alt);
          coveragePolys.forEach(function(p){p.setLatLngs(fp)});
          map.setView([pos.lat,pos.lng],map.getZoom(),{animate:true});
        }
      }
    }
  }, 2000);
}

// Start
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init);
else init();

})();
</script>
</body>
</html>
