<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NAVTRACK — Global Ship Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚓</text></svg>"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;500;700&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#04080f;--ocean:#06111e;--panel:rgba(4,14,28,.93);--border:rgba(0,190,255,.14);
--accent:#00bfff;--green:#00e5a0;--warn:#ff5e3a;--amber:#ffaa00;
--text:#a8cce0;--dim:#3d607a;
--mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;
--c-cargo:#2f9cff;--c-tanker:#ff4060;--c-passenger:#00e5a0;--c-fishing:#ffaa00;
--c-tug:#c084fc;--c-sailing:#ffd700;--c-military:#ff3b6b;--c-highspeed:#00f0ff;
--c-pleasure:#f472b6;--c-unknown:#6688aa;
}
html,body{height:100%;width:100%;background:var(--bg);font-family:var(--sans);overflow:hidden;color:var(--text)}
#map{position:absolute;inset:0;z-index:0}
.leaflet-tile-pane{filter:brightness(.55) saturate(.5) hue-rotate(185deg)}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;backdrop-filter:blur(14px);box-shadow:0 0 40px rgba(0,0,0,.6)}
#hud{position:absolute;top:16px;left:16px;z-index:900;width:260px}
#hud-title{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-text{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--accent);text-transform:uppercase}
.logo-sub{font-size:9px;color:var(--dim);letter-spacing:1px;font-family:var(--mono)}
#live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);margin-left:auto;animation:blink 2.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#stats{padding:10px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-bottom:1px solid var(--border)}
.stat{text-align:center}
.stat-num{font-family:var(--mono);font-size:20px;color:var(--accent);line-height:1}
.stat-label{font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
#sources{padding:8px 16px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
.src{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--dim);flex:1;justify-content:center}
.src-dot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.src.ok .src-dot{background:var(--green);box-shadow:0 0 5px var(--green)}
.src.err .src-dot{background:var(--warn)}
.src.loading .src-dot{background:var(--amber);animation:blink .8s infinite}
#legend{padding:8px 16px 12px}
.leg-title{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;cursor:pointer}
.leg-item.hidden{opacity:.25}
.leg-swatch{width:9px;height:9px;border-radius:2px}
#refresh-track{height:2px;background:rgba(0,190,255,.06)}
#refresh-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--accent))}
#ship-panel{position:absolute;bottom:24px;right:16px;z-index:900;width:250px;padding:14px;display:none}
#topbar{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:900}
#search-input{background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:var(--mono);padding:8px 14px;width:220px}
#search-btn{background:var(--accent);border:none;padding:8px 14px;font-family:var(--mono);font-weight:700;cursor:pointer}
#toast{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--panel);border:1px solid var(--border);padding:8px 18px;font-family:var(--mono);opacity:0}
#toast.show{opacity:1}
</style>
</head>
<body>

<div id="map"></div>

<div id="hud" class="panel">
  <div id="hud-title">
    ⚓
    <div>
      <div class="logo-text">NAVTRACK</div>
      <div class="logo-sub">GLOBAL AIS OVERLAY</div>
    </div>
    <div id="live-dot"></div>
  </div>

  <div id="stats">
    <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">Vessels</div></div>
    <div class="stat"><div class="stat-num" id="s-zoom">—</div><div class="stat-label">Zoom</div></div>
    <div class="stat"><div class="stat-num" id="s-next">30</div><div class="stat-label">Refresh</div></div>
  </div>

  <div id="sources">
    <div class="src loading" id="src-ais"><div class="src-dot"></div><div><div>AIS</div><div id="cnt-ais">—</div></div></div>
    <div class="src loading" id="src-mt"><div class="src-dot"></div><div><div>MT</div><div id="cnt-mt">—</div></div></div>
    <div class="src loading" id="src-dl"><div class="src-dot"></div><div><div>DL</div><div id="cnt-dl">—</div></div></div>
  </div>

  <div id="refresh-track"><div id="refresh-fill"></div></div>
</div>

<div id="topbar">
  <input id="search-input" type="text" placeholder="Search MMSI or vessel name…"/>
  <button id="search-btn" onclick="searchShip()">FIND</button>
</div>

<div id="ship-panel" class="panel"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>

<script>
const REFRESH_MS=30000,MIN_ZOOM=4,CLUSTER_OFF=10;
const TYPE_HEX={cargo:'#2f9cff',tanker:'#ff4060',passenger:'#00e5a0',fishing:'#ffaa00',tug:'#c084fc',sailing:'#ffd700',military:'#ff3b6b',highspeed:'#00f0ff',pleasure:'#f472b6',unknown:'#6688aa'};
const map=L.map('map',{center:[25,15],zoom:4,zoomControl:true,preferCanvas:true});
map.zoomControl.setPosition('bottomright');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap | Sources: AISstream, MarineTraffic, Datalastic',
maxZoom:19}).addTo(map);

const cluster=L.markerClusterGroup({disableClusteringAtZoom:CLUSTER_OFF});
map.addLayer(cluster);

let markers={},shipIndex={},refreshTimer,countdownTimer,countdown=30,isFetching=false;

function makeIcon(type,course){
const color=TYPE_HEX[type]||TYPE_HEX.unknown;
const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="24" viewBox="0 0 16 24" style="transform:rotate(${course||0}deg)"><polygon points="8,1 15,23 8,17 1,23" fill="${color}"/></svg>`;
return L.divIcon({html:svg,className:'',iconSize:[16,24],iconAnchor:[8,12]});
}

async function fetchShips(){
if(isFetching)return;
const zoom=map.getZoom();
if(zoom<MIN_ZOOM)return;
isFetching=true;

setSrc('ais','loading');setSrc('mt','loading');setSrc('dl','loading');

const{lat,lng}=map.getCenter();
try{
const res=await fetch(`/api/ships?lat=${lat}&lon=${lng}&zoom=${zoom}`);
const{ships,meta}=await res.json();

updateSrc('ais',meta?.sources?.aisstream?.count);
updateSrc('mt',meta?.sources?.marinetraffic?.count);
updateSrc('dl',meta?.sources?.datalastic?.count);

renderShips(ships);
document.getElementById('s-total').textContent=ships.length;
document.getElementById('s-zoom').textContent=zoom;

}catch(e){
setSrc('ais','err');setSrc('mt','err');setSrc('dl','err');
}
isFetching=false;
}

function renderShips(ships){
cluster.clearLayers();
ships.forEach(s=>{
shipIndex[s.mmsi]=s;
const m=L.marker([s.lat,s.lon],{icon:makeIcon(s.type,s.course)});
m.on('click',()=>alert(s.name));
cluster.addLayer(m);
});
}

function setSrc(id,state){
document.getElementById(`src-${id}`).className=`src ${state}`;
}
function updateSrc(id,val){
setSrc(id,typeof val==='number'?'ok':'err');
document.getElementById(`cnt-${id}`).textContent=val??'err';
}

function searchShip(){
const q=document.getElementById('search-input').value.toLowerCase();
const match=Object.values(shipIndex).find(s=>s.mmsi===q||s.name?.toLowerCase().includes(q));
if(match)map.flyTo([match.lat,match.lon],10);
}

refreshTimer=setInterval(fetchShips,REFRESH_MS);
fetchShips();
</script>

</body>
</html>
